services:
  db:
    image: postgres:16-alpine
    container_name: eolmani-db
    environment:
      POSTGRES_USER: eolmani
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: eolmani
    ports:
      - "5432:5432"
    volumes:
      - eolmani-pgdata:/var/lib/postgresql/data

volumes:
  eolmani-pgdata: